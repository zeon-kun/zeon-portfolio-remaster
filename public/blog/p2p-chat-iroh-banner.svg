<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" patternUnits="userSpaceOnUse" width="60" height="60">
      <path d="M 60 0 L 0 0 0 60" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Relay server node (center-top) -->
  <rect x="540" y="80" width="120" height="48" rx="4" fill="#1a1a1a" stroke="#a35b42" stroke-opacity="0.6" stroke-width="1"/>
  <text x="600" y="99" font-family="monospace" font-size="10" fill="#a35b42" text-anchor="middle" fill-opacity="0.8">relay.jeong.cloud</text>
  <text x="600" y="115" font-family="monospace" font-size="9" fill="#555555" text-anchor="middle">VPS · QUIC/443</text>

  <!-- Peer A (left) -->
  <rect x="140" y="310" width="100" height="44" rx="4" fill="#1a1a1a" stroke="#444444" stroke-width="1"/>
  <text x="190" y="328" font-family="monospace" font-size="10" fill="#888888" text-anchor="middle">Browser A</text>
  <text x="190" y="344" font-family="monospace" font-size="9" fill="#555555" text-anchor="middle">Jakarta</text>

  <!-- Peer B (right) -->
  <rect x="960" y="310" width="100" height="44" rx="4" fill="#1a1a1a" stroke="#444444" stroke-width="1"/>
  <text x="1010" y="328" font-family="monospace" font-size="10" fill="#888888" text-anchor="middle">Browser B</text>
  <text x="1010" y="344" font-family="monospace" font-size="9" fill="#555555" text-anchor="middle">Jakarta</text>

  <!-- Relay fallback lines (dashed, dim) -->
  <line x1="190" y1="310" x2="540" y2="128" stroke="#a35b42" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="6 4"/>
  <line x1="1010" y1="310" x2="660" y2="128" stroke="#a35b42" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Direct connection (solid, bright) -->
  <line x1="240" y1="332" x2="960" y2="332" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
  <!-- QUIC direct path highlight -->
  <line x1="240" y1="332" x2="960" y2="332" stroke="#7eb8a0" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="0"/>

  <!-- Direct label -->
  <rect x="520" y="320" width="160" height="24" rx="3" fill="#0f1f1a"/>
  <text x="600" y="336" font-family="monospace" font-size="10" fill="#7eb8a0" text-anchor="middle">QUIC direct · 22ms RTT</text>

  <!-- Relay label -->
  <text x="330" y="228" font-family="monospace" font-size="9" fill="#a35b42" fill-opacity="0.5" text-anchor="middle">relay fallback</text>
  <text x="870" y="228" font-family="monospace" font-size="9" fill="#a35b42" fill-opacity="0.5" text-anchor="middle">relay fallback</text>

  <!-- STUN ping annotations -->
  <text x="190" y="390" font-family="monospace" font-size="9" fill="#555555" text-anchor="middle">STUN · 18ms</text>
  <text x="1010" y="390" font-family="monospace" font-size="9" fill="#555555" text-anchor="middle">STUN · 21ms</text>

  <!-- iroh node ids (truncated) -->
  <text x="140" y="420" font-family="monospace" font-size="8" fill="#333333">EndpointId: 3f7a…c214</text>
  <text x="950" y="420" font-family="monospace" font-size="8" fill="#333333">EndpointId: b8e2…910f</text>

  <!-- Bottom code snippet -->
  <rect x="120" y="470" width="960" height="110" rx="4" fill="#111111" stroke="#222222" stroke-width="1"/>
  <text x="144" y="496" font-family="monospace" font-size="13" fill="#555555">// iroh-gossip pub/sub over QUIC</text>
  <text x="144" y="520" font-family="monospace" font-size="13" fill="#888888">let <tspan fill="#7eb8a0">endpoint</tspan> = Endpoint::builder()</text>
  <text x="144" y="542" font-family="monospace" font-size="13" fill="#888888">    .relay_mode(<tspan fill="#a35b42">RelayMode::Custom</tspan>(relay_map))</text>
  <text x="144" y="564" font-family="monospace" font-size="13" fill="#888888">    .bind().await?;</text>

  <!-- Kanji watermark -->
  <text x="900" y="480" font-family="sans-serif" font-weight="900" font-size="200" fill="#ffffff" fill-opacity="0.015">通</text>

  <!-- Corner label -->
  <text x="1056" y="68" font-family="monospace" font-size="11" fill="#a35b42" fill-opacity="0.5" text-anchor="end">rust / iroh 0.90+</text>
</svg>
