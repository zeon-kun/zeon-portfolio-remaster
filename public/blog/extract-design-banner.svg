<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Architectural grid -->
  <line x1="96" y1="0" x2="96" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="1104" y1="0" x2="1104" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="76" x2="1200" y2="76" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="239" x2="1200" y2="239" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="454" x2="1200" y2="454" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="554" x2="1200" y2="554" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Token extraction visualisation: three column blocks -->
  <!-- Column 1: Color swatches -->
  <rect x="120" y="160" width="200" height="270" fill="#111111" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <rect x="136" y="180" width="168" height="28" fill="#a35b42" fill-opacity="0.9"/>
  <rect x="136" y="214" width="168" height="28" fill="#f5f0eb" fill-opacity="0.15"/>
  <rect x="136" y="248" width="168" height="28" fill="#1a1a1a" fill-opacity="0.9" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <rect x="136" y="282" width="168" height="28" fill="#6e6860" fill-opacity="0.7"/>
  <rect x="136" y="316" width="168" height="28" fill="#c4a882" fill-opacity="0.5"/>
  <!-- confirmed badge -->
  <rect x="136" y="354" width="60" height="14" fill="#a35b42" fill-opacity="0.15" stroke="#a35b42" stroke-opacity="0.4" stroke-width="1"/>
  <rect x="204" y="354" width="72" height="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="284" y="354" width="20" height="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Column 2: Type scale -->
  <rect x="352" y="160" width="200" height="270" fill="#111111" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="368" y="200" font-family="monospace" font-size="22" fill="#f5f0eb" fill-opacity="0.85">Aa</text>
  <line x1="368" y1="216" x2="536" y2="216" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="368" y="238" font-family="monospace" font-size="14" fill="#f5f0eb" fill-opacity="0.6">hero</text>
  <text x="420" y="238" font-family="monospace" font-size="14" fill="#6e6860" fill-opacity="0.8">96px</text>
  <text x="368" y="260" font-family="monospace" font-size="14" fill="#f5f0eb" fill-opacity="0.6">h1</text>
  <text x="420" y="260" font-family="monospace" font-size="14" fill="#6e6860" fill-opacity="0.8">48px</text>
  <text x="368" y="282" font-family="monospace" font-size="14" fill="#f5f0eb" fill-opacity="0.6">h2</text>
  <text x="420" y="282" font-family="monospace" font-size="14" fill="#6e6860" fill-opacity="0.8">32px</text>
  <text x="368" y="304" font-family="monospace" font-size="14" fill="#f5f0eb" fill-opacity="0.6">body</text>
  <text x="420" y="304" font-family="monospace" font-size="14" fill="#6e6860" fill-opacity="0.8">16px</text>
  <text x="368" y="326" font-family="monospace" font-size="14" fill="#f5f0eb" fill-opacity="0.6">mono</text>
  <text x="420" y="326" font-family="monospace" font-size="14" fill="#6e6860" fill-opacity="0.8">13px</text>
  <text x="368" y="354" font-family="monospace" font-size="10" fill="#a35b42" fill-opacity="0.7">confirmed</text>

  <!-- Column 3: Motion tokens -->
  <rect x="584" y="160" width="200" height="270" fill="#111111" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="600" y="195" font-family="monospace" font-size="11" fill="#6e6860" fill-opacity="0.8">motion.duration</text>
  <text x="600" y="216" font-family="monospace" font-size="14" fill="#f5f0eb" fill-opacity="0.7">fast    150ms</text>
  <text x="600" y="236" font-family="monospace" font-size="14" fill="#f5f0eb" fill-opacity="0.7">base    300ms</text>
  <text x="600" y="256" font-family="monospace" font-size="14" fill="#f5f0eb" fill-opacity="0.7">slow    600ms</text>
  <line x1="600" y1="270" x2="768" y2="270" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="600" y="290" font-family="monospace" font-size="11" fill="#6e6860" fill-opacity="0.8">motion.library</text>
  <text x="600" y="310" font-family="monospace" font-size="14" fill="#a35b42" fill-opacity="0.8">GSAP 3.x</text>
  <text x="600" y="330" font-family="monospace" font-size="11" fill="#6e6860" fill-opacity="0.6">ScrollTrigger</text>
  <text x="600" y="354" font-family="monospace" font-size="10" fill="#6e6860" fill-opacity="0.5">inferred-likely</text>

  <!-- Connector lines between columns -->
  <line x1="320" y1="295" x2="352" y2="295" stroke="#a35b42" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="552" y1="295" x2="584" y2="295" stroke="#a35b42" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Output files row -->
  <rect x="120" y="466" width="140" height="50" fill="#111111" fill-opacity="0.5" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="136" y="487" font-family="monospace" font-size="10" fill="#a35b42" fill-opacity="0.8">tokens.json</text>
  <text x="136" y="504" font-family="monospace" font-size="9" fill="#6e6860" fill-opacity="0.6">design tokens</text>

  <rect x="276" y="466" width="140" height="50" fill="#111111" fill-opacity="0.5" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="292" y="487" font-family="monospace" font-size="10" fill="#f5f0eb" fill-opacity="0.6">preview.html</text>
  <text x="292" y="504" font-family="monospace" font-size="9" fill="#6e6860" fill-opacity="0.6">branded preview</text>

  <rect x="432" y="466" width="140" height="50" fill="#111111" fill-opacity="0.5" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="448" y="487" font-family="monospace" font-size="10" fill="#f5f0eb" fill-opacity="0.6">README.md</text>
  <text x="448" y="504" font-family="monospace" font-size="9" fill="#6e6860" fill-opacity="0.6">brand write-up</text>

  <!-- Down arrows from panels to output -->
  <line x1="220" y1="430" x2="190" y2="466" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="452" y1="430" x2="346" y2="466" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="684" y1="430" x2="502" y2="466" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Title block -->
  <text x="820" y="290" font-family="monospace" font-size="11" fill="#6e6860" fill-opacity="0.6">plugin / Claude Code</text>
  <text x="820" y="320" font-family="serif" font-size="38" fill="#f5f0eb" fill-opacity="0.9" font-weight="700">extract</text>
  <text x="820" y="362" font-family="serif" font-size="38" fill="#a35b42" fill-opacity="0.9" font-weight="700">-design</text>
  <line x1="820" y1="378" x2="1080" y2="378" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="820" y="400" font-family="monospace" font-size="11" fill="#6e6860" fill-opacity="0.5">reverse-engineer any brand's</text>
  <text x="820" y="418" font-family="monospace" font-size="11" fill="#6e6860" fill-opacity="0.5">visual language</text>

  <!-- Corner accent -->
  <line x1="1104" y1="554" x2="1140" y2="554" stroke="#a35b42" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="1104" y1="554" x2="1104" y2="590" stroke="#a35b42" stroke-opacity="0.3" stroke-width="1"/>
</svg>
